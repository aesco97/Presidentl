<style>
  :root{
    --paper:#F6EFDF; --paper-2:#FBF6EA; --paper-3:#EAE0C8;
    --blue:#2E4A7A; --red:#A63A32; --red-dk:#7C2B25;
    --gold:#C9A23F; --green:#5E7C4A;
    --ink:#3D3320; --ink-2:#4A4232; --ink-3:#6B5E48; --ink-4:#8A7B5C; --ink-5:#A99A78;
    --rule:#D8CBAC;
    --display:'Alfa Slab One', Georgia, serif;
    --text:'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --safe-bot:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{font-family:var(--text);background:var(--paper-3);color:var(--ink-2);
    touch-action:manipulation;-webkit-font-smoothing:antialiased;}
  #app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--paper);
    display:flex;flex-direction:column;box-shadow:0 0 40px rgba(61,51,32,.2);}
  a{color:var(--blue);} a:hover{color:var(--red);}

  /* Chrome */
  .bunting{height:8px;flex:none;
    background:repeating-linear-gradient(90deg,var(--red) 0 24px,var(--paper) 24px 48px,var(--blue) 48px 72px,var(--paper) 72px 96px);}
  .bunting.sm{height:6px;margin-bottom:14px;
    background:repeating-linear-gradient(90deg,var(--red) 0 18px,var(--paper) 18px 36px,var(--blue) 36px 54px,var(--paper) 54px 72px);}
  .hdr{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:3px double var(--blue);position:relative;}
  .wordmark{font-family:var(--display);font-size:19px;color:var(--blue);letter-spacing:.01em;font-weight:400;}
  .tabs{display:flex;gap:2px;margin-left:auto;align-items:center;}
  .tab{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);padding:6px 8px;
    background:none;border:none;cursor:pointer;font-family:var(--text);}
  .tab.active{color:var(--red);font-weight:900;border-bottom:2px solid var(--red);}
  .burger{width:34px;height:34px;display:grid;place-items:center;background:none;border:none;cursor:pointer;padding:0;}
  .menu{position:absolute;top:calc(100% + 8px);right:12px;background:var(--paper-2);border:2px solid var(--blue);
    box-shadow:4px 4px 0 rgba(46,74,122,.25);padding:4px;display:flex;flex-direction:column;min-width:150px;z-index:30;}
  .menu button{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--blue);padding:12px;min-height:44px;
    border:none;background:none;text-align:left;border-bottom:1px dashed var(--rule);cursor:pointer;font-family:var(--text);}
  .menu button:last-child{border-bottom:none;}

  /* Masthead */
  .masthead{text-align:center;padding:22px 20px 4px;}
  .kicker{font-size:10.5px;font-weight:900;letter-spacing:.22em;color:var(--red);}
  .hero{font-family:var(--display);font-size:26px;color:var(--blue);margin-top:6px;line-height:1.15;font-weight:400;}
  .tagline{font-size:13px;font-weight:600;color:var(--ink-3);margin-top:6px;}
  h1{font-family:var(--display);font-size:26px;color:var(--blue);margin:.15em 0;font-weight:400;line-height:1.2;}
  h2{font-family:var(--display);font-size:20px;color:var(--blue);margin:.15em 0 .3em;font-weight:400;}
  .muted{color:var(--ink-3);font-size:13px;line-height:1.6;}
  .center{text-align:center;} .hide{display:none!important;}
  .sect{padding:16px;}
  .stripe{border-top:3px double var(--blue);margin:16px 0;}
  .grid{display:grid;gap:10px;}
  .prose{font-size:13px;color:var(--ink-2);line-height:1.7;}
  .prose p{margin:0 0 12px;}
  .prose h2{font-family:var(--display);font-size:15px;color:var(--blue);font-weight:400;
    margin:20px 0 8px;padding-top:12px;border-top:1px dashed var(--rule);}
  .prose a{color:var(--blue);font-weight:600;}
  .prose a:hover{color:var(--red);}

  /* Board */
  .board{padding:16px 16px 8px;display:flex;flex-direction:column;gap:6px;}
  .cells{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
  .cells.labels>div{font-size:9px;font-weight:900;letter-spacing:.1em;color:var(--ink-4);text-align:center;}
  .cell{height:44px;display:grid;place-items:center;font-weight:900;font-size:12px;line-height:1.1;
    background:var(--paper-3);color:var(--ink-4);animation:flip .35s ease both;text-align:center;padding:2px;}
  .cell.g{background:var(--green);color:var(--paper);}
  .cell.y{background:var(--gold);color:var(--ink);}
  .cell.n{background:var(--paper-3);color:var(--ink-4);}
  .cellEmpty{height:44px;border:1.5px dashed var(--rule);}
  @keyframes flip{from{transform:rotateX(-90deg);opacity:0}to{transform:rotateX(0);opacity:1}}
  .guessRow{border:2px solid var(--blue);background:var(--paper-2);padding:8px;box-shadow:3px 3px 0 rgba(46,74,122,.15);}
  .gName{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px;font-weight:900;
    color:var(--ink);letter-spacing:.03em;text-transform:uppercase;}
  .gName .num{margin-left:auto;font-size:11px;font-weight:700;color:var(--ink-4);text-transform:none;}

  /* Portraits — square, letterpress framed */
  .avatar{flex:none;border:1.5px solid var(--blue);background-color:var(--paper-3);
    background-size:cover;background-position:center top;display:grid;place-items:center;
    color:var(--blue);font-family:var(--display);overflow:hidden;}
  .avatar span{font-size:11px;font-weight:400;}
  .avatar.big{width:150px;height:150px;margin:8px auto;border:2px solid var(--blue);}
  .avatar.big span{font-size:44px;}

  /* Input */
  .searchWrap{position:relative;padding:8px 16px 4px;}
  .searchInput{width:100%;padding:14px 12px;border:2px solid var(--blue);background:var(--paper-2);
    color:var(--ink);font-size:16px;font-weight:700;font-family:var(--text);outline:none;}
  .searchInput::placeholder{color:var(--ink-5);}
  .searchInput:focus{border-color:var(--red);}
  .sugg{position:absolute;left:16px;right:16px;top:calc(100% - 4px);background:var(--paper-2);
    border:2px solid var(--blue);box-shadow:4px 4px 0 rgba(46,74,122,.25);max-height:250px;overflow:auto;z-index:25;}
  .sugg button{width:100%;text-align:left;background:none;border:none;border-bottom:1px dashed var(--rule);
    color:var(--ink);padding:10px 12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:9px;
    font-family:var(--text);min-height:44px;cursor:pointer;}
  .sugg button:last-child{border-bottom:none;}

  /* Buttons */
  .btn{width:100%;background:var(--red);color:var(--paper);border:2px solid var(--red-dk);padding:14px;
    text-align:center;font-weight:900;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
    box-shadow:3px 3px 0 rgba(61,51,32,.3);cursor:pointer;font-family:var(--text);min-height:48px;}
  .btn:active{transform:translate(2px,2px);box-shadow:none;}
  .btn.secondary{background:transparent;border:2px solid var(--blue);color:var(--blue);box-shadow:none;}
  .btn:disabled{opacity:.45;}

  /* Stat pills */
  .row{display:flex;gap:8px;padding:16px 16px 4px;}
  .pill{flex:1;border:2px solid var(--rule);background:var(--paper-2);padding:11px 8px;text-align:center;}
  .pill b{display:block;font-family:var(--display);font-size:20px;color:var(--blue);font-weight:400;}
  .pill span{display:block;font-size:9px;font-weight:900;letter-spacing:.12em;color:var(--ink-4);margin-top:2px;}

  /* Quiz */
  .prompt{font-family:var(--display);font-size:18px;color:var(--blue);margin:4px 0 6px;line-height:1.3;font-weight:400;}
  .subprompt{font-size:9.5px;font-weight:900;letter-spacing:.18em;color:var(--red);text-transform:uppercase;margin-bottom:12px;}
  .opts{display:grid;gap:8px;}
  .opt{width:100%;text-align:left;background:var(--paper-2);border:2px solid var(--blue);color:var(--ink);
    padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--text);min-height:48px;
    box-shadow:2px 2px 0 rgba(46,74,122,.12);}
  .opt:active{transform:translate(2px,2px);box-shadow:none;}
  .opt.correct{background:var(--green);color:var(--paper);border-color:#47603a;}
  .opt.wrong{background:var(--red);color:var(--paper);border-color:var(--red-dk);}
  .opt.dim{opacity:.4;}
  .card{border:2px solid var(--blue);background:var(--paper-2);padding:14px;margin:16px;
    box-shadow:3px 3px 0 rgba(46,74,122,.15);}
  .fact{border:2px solid var(--rule);background:var(--paper-2);padding:11px;font-size:12.5px;color:var(--ink-2);
    line-height:1.55;margin-top:10px;}
  .fact b{color:var(--ink);font-weight:900;}
  .result-big{font-family:var(--display);font-size:44px;color:var(--blue);text-align:center;font-weight:400;}
  .progress{display:flex;gap:5px;margin:0 0 12px;}
  .progress .dot{flex:1;height:5px;background:var(--rule);}
  .progress .dot.on{background:var(--red);}
  .progress .dot.done{background:var(--green);}

  /* How to play */
  .howto{margin:16px 16px 0;border-top:3px double var(--blue);padding-top:14px;}
  .howto .h{font-size:11px;font-weight:900;letter-spacing:.18em;color:var(--red);text-align:center;}
  .howto p{font-size:13px;color:var(--ink-2);line-height:1.6;margin:8px 0 0;text-align:center;}
  .chip{font-weight:900;padding:1px 5px;}
  .chip.g{background:var(--green);color:var(--paper);}
  .chip.y{background:var(--gold);color:var(--ink);}

  /* Distribution (stats) */
  .dist{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:11px;font-weight:900;color:var(--ink-4);}
  .dist .bar{height:20px;background:var(--blue);color:var(--paper);display:grid;place-items:center;
    font-size:10px;font-weight:900;min-width:22px;padding:0 5px;}
  .dist .bar.hi{background:var(--red);}

  .toast{position:fixed;left:50%;bottom:calc(20px + var(--safe-bot));transform:translateX(-50%);
    background:var(--blue);color:var(--paper);border:2px solid var(--ink);padding:10px 16px;
    font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;z-index:50;opacity:0;
    transition:opacity .25s;box-shadow:3px 3px 0 rgba(61,51,32,.3);}
  .toast.show{opacity:1;}
  a.link{color:var(--blue);text-decoration:none;font-weight:900;}
  .wlink{color:inherit;text-decoration:none;border-bottom:1px dotted var(--ink-4);}
  .wmore{display:inline-block;margin-top:6px;color:var(--blue);text-decoration:none;font-weight:900;
    font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;}
  .wmore:hover{color:var(--red);}
  a.avlink{display:inline-flex;text-decoration:none;flex:none;}
  .foot{padding:12px 16px 0;text-align:center;color:var(--ink-4);font-size:9.5px;font-weight:900;
    letter-spacing:.12em;text-transform:uppercase;}

  /* Mode buttons (pub quiz) */
  .mode-btn{width:100%;text-align:left;border:2px solid var(--blue);background:var(--paper-2);padding:13px;
    display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:3px 3px 0 rgba(46,74,122,.15);font-family:var(--text);}
  .mode-btn:active{transform:translate(2px,2px);box-shadow:none;}
  .mode-btn>div{font-size:13px;font-weight:900;color:var(--ink);letter-spacing:.05em;text-transform:uppercase;}
  .mode-btn small{display:block;font-weight:600;color:var(--ink-3);font-size:11.5px;margin-top:3px;
    text-transform:none;letter-spacing:0;}
  .mode-ico{width:34px;height:34px;border:1.5px solid var(--blue);background:var(--paper-3);
    display:grid;place-items:center;font-size:16px;flex:none;}
  .mode-daily{border-left:6px solid var(--red);}
  .mode-quiz{border-left:6px solid var(--blue);}

  /* Sort list (pub quiz) */
  .sortlist{list-style:none;padding:0;margin:12px 0;position:relative;}
  .sortItem{background:var(--paper-2);border:2px solid var(--blue);padding:10px;margin:6px 0;
    display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;color:var(--ink);
    touch-action:none;user-select:none;box-shadow:2px 2px 0 rgba(46,74,122,.12);}
  .sortItem .rank{width:26px;height:26px;background:var(--blue);color:var(--paper);
    display:grid;place-items:center;font-size:12px;font-weight:900;flex:none;}
  .sortItem .grip{margin-left:auto;color:var(--ink-4);font-size:16px;letter-spacing:-2px;}
  .sortItem.dragging{box-shadow:4px 4px 0 rgba(46,74,122,.3);z-index:5;}
  .sortItem.correct{border-color:var(--green);background:#e9eede;}
  .sortItem.wrong{border-color:var(--red);background:#f2e2df;}
  .sortItem .yr{color:var(--ink-4);font-weight:900;font-size:12px;}
  .seg{display:flex;border:2px solid var(--blue);margin:10px 0;}
  .seg button{flex:1;background:none;border:none;color:var(--ink-3);padding:10px;font-weight:900;font-size:12px;}
  .seg button.active{background:var(--red);color:var(--paper);}

  /* Page footer */
  .pgfoot{margin-top:auto;padding:22px 16px calc(18px + var(--safe-bot));text-align:center;}
  .pgfoot .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .pgfoot .links button{background:none;border:none;color:var(--ink-4);font-family:var(--text);
    font-size:10.5px;font-weight:700;letter-spacing:.1em;cursor:pointer;padding:4px;}
  .pgfoot .links button:hover{color:var(--red);}
  .pgfoot .copy{font-size:10px;color:var(--ink-5);margin-top:8px;letter-spacing:.06em;}
</style>
</head>

<script>
/* ============================================================
   DATA — 47 U.S. Presidents
   Cleveland counted twice (22 & 24); term = first inauguration.
   ============================================================ */
const P = [
 {n:1,name:"George Washington",start:1789,end:1797,party:"None / Federalist",vp:"John Adams",event:"Presided over the first federal government and put down the Whiskey Rebellion."},
 {n:2,name:"John Adams",start:1797,end:1801,party:"Federalist",vp:"Thomas Jefferson",event:"Signed the Alien and Sedition Acts amid the Quasi-War with France."},
 {n:3,name:"Thomas Jefferson",start:1801,end:1809,party:"Democratic-Republican",vp:"Aaron Burr; George Clinton",event:"Completed the Louisiana Purchase (1803), doubling the nation's size."},
 {n:4,name:"James Madison",start:1809,end:1817,party:"Democratic-Republican",vp:"George Clinton; Elbridge Gerry",event:"Led the country through the War of 1812."},
 {n:5,name:"James Monroe",start:1817,end:1825,party:"Democratic-Republican",vp:"Daniel D. Tompkins",event:"Issued the Monroe Doctrine (1823)."},
 {n:6,name:"John Quincy Adams",start:1825,end:1829,party:"Democratic-Republican",vp:"John C. Calhoun",event:"Won the contested 'corrupt bargain' election of 1824."},
 {n:7,name:"Andrew Jackson",start:1829,end:1837,party:"Democratic",vp:"John C. Calhoun; Martin Van Buren",event:"Signed the Indian Removal Act and fought the Bank War."},
 {n:8,name:"Martin Van Buren",start:1837,end:1841,party:"Democratic",vp:"Richard M. Johnson",event:"Presided during the Panic of 1837."},
 {n:9,name:"William Henry Harrison",start:1841,end:1841,party:"Whig",vp:"John Tyler",event:"Died of illness just 31 days into his term — the shortest presidency."},
 {n:10,name:"John Tyler",start:1841,end:1845,party:"Whig / None",vp:"—",event:"First VP to succeed to the presidency; annexed Texas."},
 {n:11,name:"James K. Polk",start:1845,end:1849,party:"Democratic",vp:"George M. Dallas",event:"Won the Mexican–American War, adding the Southwest and California."},
 {n:12,name:"Zachary Taylor",start:1849,end:1850,party:"Whig",vp:"Millard Fillmore",event:"Died in office in 1850 during the slavery-in-territories crisis."},
 {n:13,name:"Millard Fillmore",start:1850,end:1853,party:"Whig",vp:"—",event:"Signed the Compromise of 1850, including the Fugitive Slave Act."},
 {n:14,name:"Franklin Pierce",start:1853,end:1857,party:"Democratic",vp:"William R. King",event:"Signed the Kansas–Nebraska Act, reigniting the slavery conflict."},
 {n:15,name:"James Buchanan",start:1857,end:1861,party:"Democratic",vp:"John C. Breckinridge",event:"Watched Southern states begin to secede before the Civil War."},
 {n:16,name:"Abraham Lincoln",start:1861,end:1865,party:"Republican",vp:"Hannibal Hamlin; Andrew Johnson",event:"Led the Union through the Civil War and issued the Emancipation Proclamation."},
 {n:17,name:"Andrew Johnson",start:1865,end:1869,party:"National Union / Democratic",vp:"—",event:"Clashed over Reconstruction and was impeached in 1868 (acquitted by one vote)."},
 {n:18,name:"Ulysses S. Grant",start:1869,end:1877,party:"Republican",vp:"Schuyler Colfax; Henry Wilson",event:"Enforced Reconstruction and fought the Ku Klux Klan."},
 {n:19,name:"Rutherford B. Hayes",start:1877,end:1881,party:"Republican",vp:"William A. Wheeler",event:"The Compromise of 1877 ended Reconstruction and withdrew federal troops."},
 {n:20,name:"James A. Garfield",start:1881,end:1881,party:"Republican",vp:"Chester A. Arthur",event:"Assassinated months into his term in 1881."},
 {n:21,name:"Chester A. Arthur",start:1881,end:1885,party:"Republican",vp:"—",event:"Signed the Pendleton Civil Service Reform Act."},
 {n:22,name:"Grover Cleveland",start:1885,end:1889,party:"Democratic",vp:"Thomas A. Hendricks",event:"First term of the only president to serve two non-consecutive terms."},
 {n:23,name:"Benjamin Harrison",start:1889,end:1893,party:"Republican",vp:"Levi P. Morton",event:"Signed the Sherman Antitrust Act (1890)."},
 {n:24,name:"Grover Cleveland",start:1893,end:1897,party:"Democratic",vp:"Adlai Stevenson I",event:"Second, non-consecutive term; faced the Panic of 1893."},
 {n:25,name:"William McKinley",start:1897,end:1901,party:"Republican",vp:"Garret Hobart; Theodore Roosevelt",event:"Won the Spanish–American War (1898); assassinated in 1901."},
 {n:26,name:"Theodore Roosevelt",start:1901,end:1909,party:"Republican",vp:"Charles W. Fairbanks",event:"Began the Panama Canal and 'trust-busting' of monopolies."},
 {n:27,name:"William Howard Taft",start:1909,end:1913,party:"Republican",vp:"James S. Sherman",event:"Pursued 'Dollar Diplomacy' and antitrust suits; later Chief Justice."},
 {n:28,name:"Woodrow Wilson",start:1913,end:1921,party:"Democratic",vp:"Thomas R. Marshall",event:"Led the U.S. through World War I and proposed the League of Nations."},

/* Display name — presidents who served non-consecutive terms (Cleveland 22/24,

   p.name stays clean for Wikipedia lookups and portrait matching. */
(function(){

  P.forEach(p=>counts[p.name]=(counts[p.name]||0)+1);
  P.forEach(p=>{

  });
})();

/* ============================================================
   PORTRAITS
   Cascade: local images/<n>.jpg  ->  Wikipedia portrait  ->  monogram
   Runs in the user's browser (needs internet only for the Wikipedia fallback).
   ============================================================ */
const wikiThumb={}; // name -> resolved url (or null)
function initials(name){
  const parts=name.replace(/[.,]/g,"").split(" ").filter(w=>w.length>1||/[A-Z]/.test(w));
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function loadWikiThumb(name,size){
  if(name in wikiThumb) return Promise.resolve(wikiThumb[name]);
  const url="https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(name.replace(/ /g,"_"));
  return fetch(url).then(r=>r.json()).then(j=>{
    let src=(j.originalimage&&j.originalimage.source)||(j.thumbnail&&j.thumbnail.source)||null;
    if(src&&size){ src=src.replace(/\/\d+px-/,"/"+size+"px-"); }
    wikiThumb[name]=src; return src;
  }).catch(()=>{wikiThumb[name]=null;return null;});
}
function setBg(node,url){ node.style.backgroundImage=`url("${url}")`; const s=node.querySelector("span"); if(s)s.style.display="none"; }
// Build an avatar node; fills with a picture asynchronously, keeps monogram until/unless one loads.
function avatar(p,size,extraClass){
  const px=size||44;
  const node=el(`<div class="avatar ${extraClass||''}" style="width:${px}px;height:${px}px"><span>${initials(p.name)}</span></div>`);
  const wikiSize=Math.max(160,px*2);
  // 1) try a local file first
  const probe=new Image();
  probe.onload=()=>setBg(node,probe.src);
  probe.onerror=()=>{ loadWikiThumb(p.name,wikiSize).then(u=>{ if(u) setBg(node,u); }); };
  probe.src="images/"+p.n+".jpg";
  return node;
}
function wikiURL(p){return "https://en.wikipedia.org/wiki/"+encodeURIComponent(p.name.replace(/ /g,"_"));}
function factFace(p,html){

  const a=el(`<a class="avlink" href="${wikiURL(p)}" target="_blank" rel="noopener"></a>`);
  a.appendChild(avatar(p,46));

}

/* ============================================================
   Seeded RNG (deterministic daily)
   ============================================================ */
function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return (h^=h>>>16)>>>0;};}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function rngFrom(seedStr){const s=xmur3(seedStr);return mulberry32(s());}
function shuffle(arr,rand){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickN(arr,n,rand){return shuffle(arr,rand).slice(0,n);}
function sample(arr,rand){return arr[Math.floor(rand()*arr.length)];}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* ============================================================
   SORT COMPONENT (pointer-based drag reorder, touch-friendly)
   ============================================================ */
function makeSortList(items, container){
  // items: array of president objects in the (shuffled) starting order
  let order=items.slice();
  const list=el('<ul class="sortlist"></ul>');
  container.appendChild(list);

  function render(){
    list.innerHTML="";
    order.forEach((p,i)=>{
      const li=el(`<li class="sortItem" data-n="${p.n}">
        <div class="rank">${i+1}</div>
        <div>${p.disp}</div>
        <div class="grip">≡</div>
      </li>`);
      li.insertBefore(avatar(p,34),li.children[1]);
      list.appendChild(li);
    });
  }
  render();

  // Pointer drag logic (pointer events cover mouse + touch)
  //
  // The dragged row is offset with translateY(curY - startY). When we reorder it
  // in the DOM its *layout* position jumps by a row height, and since the
  // transform is relative to that new position the row visually leaps — which
  // immediately satisfies the next swap test, cascading it to one end of the
  // list. Fix: after every reorder, re-baseline startY by however far the row
  // just moved, so it stays visually still and only one swap happens per crossing.
  let dragEl=null,startY=0,curY=0;
  function onDown(e){
    if(e.button!==undefined && e.button!==0) return; // primary button only
    const target=e.target.closest(".sortItem");
    if(!target || !list.contains(target)) return;
    dragEl=target;
    startY=curY=e.clientY;
    dragEl.classList.add("dragging");
    dragEl.style.position="relative";
    dragEl.style.zIndex="10";
    dragEl.style.transform="translateY(0px)";
    document.addEventListener("pointermove",onMove,{passive:false});
    document.addEventListener("pointerup",onUp);
    document.addEventListener("pointercancel",onUp);
    e.preventDefault();
  }
  function moveTo(sib,after){
    const before=dragEl.getBoundingClientRect().top;
    list.insertBefore(dragEl, after ? sib.nextSibling : sib);
    const now=dragEl.getBoundingClientRect().top;
    startY += (now-before);            // compensate the layout jump
    dragEl.style.transform=`translateY(${curY-startY}px)`;
    reindex();
  }
  function onMove(e){
    if(!dragEl) return;
    e.preventDefault();
    curY=e.clientY;
    dragEl.style.transform=`translateY(${curY-startY}px)`;
    const dr=dragEl.getBoundingClientRect();
    const dragMid=dr.top+dr.height/2;
    for(const s of [...list.children]){
      if(s===dragEl) continue;
      const r=s.getBoundingClientRect();
      const mid=r.top+r.height/2;
      // DOCUMENT_POSITION_FOLLOWING => dragEl comes after s, i.e. s sits above
      const sAbove=!!(s.compareDocumentPosition(dragEl)&Node.DOCUMENT_POSITION_FOLLOWING);
      if(sAbove && dragMid<mid){ moveTo(s,false); break; }
      if(!sAbove && dragMid>mid){ moveTo(s,true);  break; }
    }
  }
  function reindex(){
    [...list.children].forEach((c,i)=>{c.querySelector(".rank").textContent=i+1;});
  }
  function onUp(){
    if(!dragEl) return;
    dragEl.classList.remove("dragging");
    dragEl.style.transform="";dragEl.style.position="";dragEl.style.zIndex="";
    dragEl=null;
    document.removeEventListener("pointermove",onMove);
    document.removeEventListener("pointerup",onUp);
    document.removeEventListener("pointercancel",onUp);
    // update order from DOM
    order=[...list.children].map(c=>P.find(p=>p.n==c.dataset.n));
  }
  list.addEventListener("pointerdown",onDown);

  return {
    getOrder:()=>[...list.children].map(c=>P.find(p=>p.n==c.dataset.n)),
    lock:(correctOrder)=>{
      [...list.children].forEach((c,i)=>{
        const n=+c.dataset.n;
        const ok=correctOrder[i].n===n;
        c.classList.add(ok?"correct":"wrong");
        const yr=P.find(p=>p.n===n);
        c.querySelector(".grip").outerHTML=`<div class="yr">${yr.start}</div>`;
      });
      list.style.pointerEvents="none";
    }
  };
}

const MAX_GUESSES=6;
// Number of 4-year terms each president served in (a partial term counts as 1).
const TERMS={1:2,2:1,3:2,4:2,5:2,6:1,7:2,8:1,9:1,10:1,11:1,12:1,13:1,14:1,15:1,16:2,17:1,18:2,19:1,20:1,21:1,22:1,23:1,24:1,25:2,26:2,27:1,28:2,29:1,30:2,31:1,32:4,33:2,34:2,35:1,36:2,37:2,38:1,39:1,40:2,41:1,42:2,43:2,44:2,45:1,46:1,47:1};
P.forEach(p=>p.terms=TERMS[p.n]);

function partyShort(s){
  if(/Democratic-Rep/i.test(s))return "Dem-Rep";
  if(/Democratic/i.test(s))return "Dem";
  if(/Republican/i.test(s))return "Rep";
  if(/Whig/i.test(s))return "Whig";
  if(/Federalist/i.test(s))return "Fed";
  if(/Union/i.test(s))return "Union";
  return "None";
}
function partyKey(s){
  if(/Democratic-Rep/i.test(s))return "DR";
  if(/Democratic/i.test(s))return "D";
  if(/Republican/i.test(s))return "R";
  if(/Whig/i.test(s))return "W";
  if(/Federalist/i.test(s))return "F";
  if(/Union/i.test(s))return "D";
  return "O";
}
function vpSet(p){return p.vp==="—"?[]:p.vp.split(";").map(s=>s.trim());}
function vpLast(p){const s=vpSet(p);if(!s.length)return "—";const w=s[0].split(" ");return w[w.length-1];}

function Daily(){
  const rand=rngFrom("potus-daily-"+todayStr());
  const target=sample(P,rand);
  const saved=loadState().dailyGame;
  const resume = saved && saved.date===todayStr();
  const guesses = resume ? saved.guesses.slice() : [];
  let done = resume ? saved.done : false;
  let win  = resume ? saved.win  : false;

  const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  function save(){
    const s=loadState();
    const already = s.dailyGame && s.dailyGame.date===todayStr() && s.dailyGame.done;
    s.dailyGame={date:todayStr(),guesses:guesses.slice(),done,win};
    if(done) s.dailyDone=todayStr();
    if(done && !already){
      s.played=(s.played||0)+1;
      if(win){
        const y=new Date();y.setDate(y.getDate()-1);
        s.streak=(s.lastSolved===fmt(y))?(s.streak||0)+1:1;
        s.lastSolved=todayStr();
        s.best=Math.max(s.best||0,s.streak);
        s.wins=(s.wins||0)+1;
        s.dist=s.dist||{};
        s.dist[guesses.length]=(s.dist[guesses.length]||0)+1;
      } else { s.streak=0; }
    }
    saveState(s);
  }

  // compare a guess to the target -> 5 cells (#, VP, Year, Party, Terms)
  function cellsFor(g){
    const num=(gv,tv,r)=>({cls:gv===tv?"g":(Math.abs(gv-tv)<=r?"y":"n"),arw:gv===tv?"":(tv>gv?"↑":"↓"),val:gv});
    const pMatch=partyKey(g.party)===partyKey(target.party);
    return [
      Object.assign(num(g.n,target.n,5),{lab:"#"}),
      Object.assign(num(vpSet(g).length,vpSet(target).length,1),{lab:"VPs"}),
      Object.assign(num(g.start,target.start,20),{lab:"Year"}),
      {cls:pMatch?"g":"n",arw:"",val:partyShort(g.party).toUpperCase(),lab:"Party"},
      Object.assign(num(g.terms,target.terms,1),{lab:"Terms"})
    ];
  }

  function submit(n){
    if(done||guesses.includes(n))return;
    guesses.push(n);
    if(n===target.n){done=true;win=true;}
    else if(guesses.length>=MAX_GUESSES){done=true;win=false;}
    save();render();
    if(done)setTimeout(()=>toast(win?"Solved! 🎖️":"Out of guesses"),60);
  }

  function renderInput(){
    let pending=null;
    const w=el(`<div class="searchWrap">
      <input class="searchInput" id="gi" placeholder="Name your candidate…" autocomplete="off" autocapitalize="words" autocorrect="off">
      <div class="sugg hide" id="sg"></div></div>`);
    app.appendChild(w);
    const castWrap=el(`<div style="padding:6px 16px 4px"></div>`);
    const cast=el(`<button class="btn">Cast your guess</button>`);
    castWrap.appendChild(cast); app.appendChild(castWrap);
    const inp=w.querySelector("#gi"), sg=w.querySelector("#sg");
    function hideSugg(){sg.classList.add("hide");}
    inp.addEventListener("input",()=>{
      pending=null;
      const q=inp.value.trim().toLowerCase();
      sg.innerHTML="";
      if(!q){hideSugg();return;}
      const matches=P.filter(p=>!guesses.includes(p.n)&&p.name.toLowerCase().includes(q)).slice(0,8);
      if(!matches.length){hideSugg();return;}
      matches.forEach(p=>{
        const b=el(`<button data-n="${p.n}"><b>${p.disp}</b>&nbsp;<span style="color:var(--ink-4);font-weight:700;font-size:11px">No.${p.n} · ${termLabel(p)}</span></button>`);
        b.insertBefore(avatar(p,26),b.firstChild);
        b.onclick=()=>{inp.value=p.disp;pending=p.n;hideSugg();};
        sg.appendChild(b);
      });
      sg.classList.remove("hide");
    });
    cast.onclick=()=>{
      if(pending!==null){submit(pending);return;}
      const q=inp.value.trim().toLowerCase();
      if(!q){toast("Name a candidate first");inp.focus();return;}
      const pool=P.filter(p=>!guesses.includes(p.n));
      let m=pool.filter(p=>p.disp.toLowerCase()===q);
      if(m.length!==1) m=pool.filter(p=>p.name.toLowerCase()===q);
      if(m.length!==1) m=pool.filter(p=>p.name.toLowerCase().includes(q));
      if(m.length===1) submit(m[0].n);
      else if(m.length===0) toast("No such president");
      else toast("Pick one from the list");
    };
  }

  function shareG(){
    const rows=guesses.map(n=>cellsFor(P.find(p=>p.n===n)).map(c=>c.cls==="g"?"🟩":c.cls==="y"?"🟨":"⬜").join("")).join("\n");
    const txt=`PRESIDENTL No. ${puzzleNo()}\n${win?guesses.length:"X"}/${MAX_GUESSES}\n`+rows;
    if(navigator.share)navigator.share({text:txt}).catch(()=>{});
    else{navigator.clipboard?.writeText(txt);toast("Result copied");}
  }

  function renderEnd(){
    const box=el(`<div class="sect">
      <div class="center">
        ${win?`<div class="kicker">★ ELECTED IN ${guesses.length} ★</div><div class="result-big">${guesses.length}/${MAX_GUESSES}</div>`
             :`<div class="kicker">★ NO CONFIRMATION ★</div><p class="muted" style="margin:6px 0 0">Out of guesses. Today's president was:</p>`}
      </div>
    </div>`);
    app.appendChild(box);
    const inner=box.querySelector(".center");
    inner.parentNode.appendChild(factFace(target,`<b>${target.disp.toUpperCase()}</b> — No. ${target.n} · ${termLabel(target)} · ${partyShort(target.party)} · ${target.terms} term${target.terms>1?'s':''}. ${target.event}`));
    const share=el('<button class="btn" style="margin-top:12px">Share result</button>');share.onclick=shareG;
    box.appendChild(share);
    const st=el('<button class="btn secondary" style="margin-top:10px">See your stats</button>');st.onclick=()=>navTo('/stats');
    box.appendChild(st);
    const hm=el('<button class="btn secondary" style="margin-top:10px">Back to home</button>');hm.onclick=()=>navTo('/');
    box.appendChild(hm);
  }

  function render(){
    clear();
    app.appendChild(el(header()));
    app.appendChild(el(`<div class="masthead">
      <div class="kicker">★ PUZZLE No. ${puzzleNo()} · ${longDate()} ★</div>
      <div class="hero">GUESS TODAY'S<br>PRESIDENT</div>
      <div class="tagline">Six guesses. Five clues. One Commander-in-Chief.</div>
    </div>`));
    const board=el(`<div class="board">
      <div class="cells labels"><div>No.</div><div>VPs</div><div>YEAR</div><div>PARTY</div><div>TERMS</div></div>
    </div>`);
    app.appendChild(board);
    guesses.forEach((n,i)=>{
      const g=P.find(p=>p.n===n);
      const row=el(`<div class="guessRow">
        <div class="gName"><a class="wlink" href="${wikiURL(g)}" target="_blank" rel="noopener">${g.disp}</a><span class="num">${i+1}/${MAX_GUESSES}</span></div>
        <div class="cells"></div></div>`);
      const nameEl=row.querySelector(".gName");
      const al=el(`<a class="avlink" href="${wikiURL(g)}" target="_blank" rel="noopener"></a>`);
      al.appendChild(avatar(g,30));
      nameEl.insertBefore(al,nameEl.firstChild);
      const ce=row.querySelector(".cells");
      cellsFor(g).forEach((c,ci)=>ce.appendChild(el(
        `<div class="cell ${c.cls}" style="animation-delay:${ci*60}ms">${c.val}${c.arw}</div>`)));
      board.appendChild(row);
    });
    for(let i=guesses.length;i<MAX_GUESSES;i++){
      board.appendChild(el(`<div class="cells">${'<div class="cellEmpty"></div>'.repeat(5)}</div>`));
    }
    if(done) renderEnd(); else renderInput();
    const s=loadState();
    const played=s.played||0, wins=s.wins||0, pct=played?Math.round(wins/played*100):0;
    app.appendChild(el(`<div class="row">
      <div class="pill"><b>${s.streak||0}</b><span>STREAK</span></div>
      <div class="pill"><b>${pct}%</b><span>WON</span></div>
      <div class="pill"><b>${played}</b><span>PLAYED</span></div>
    </div>`));
    app.appendChild(el(`<div class="howto">
      <div class="h">★ HOW TO PLAY ★</div>
      <p>Name any U.S. president. Each guess reveals how close you are on number, vice presidents, year sworn in, party, and terms served.
      <span class="chip g">GREEN</span> is exact, <span class="chip y">GOLD</span> is close, and arrows point the way.</p>
    </div>`));
    endPage();
  }

  render();
}

   PUB QUIZ MODE
   ============================================================ */
/* Difficulty. The real lever isn't the number of options — it's how close the
   wrong answers sit to the right one. Easy pulls distractors from far-flung
   eras; hard pulls the target's nearest neighbours in number, era and party. */
const DIFF={
  easy:  {opts:3, sort:5, blurb:"Three options, drawn from far-flung eras and rival parties."},
  medium:{opts:4, sort:7, blurb:"Four options, pulled from the same neighbourhood of history."},
  hard:  {opts:6, sort:9, blurb:"Six options — same era, same party, consecutive terms. No mercy."}
};
let QUIZ_DIFF=(loadState().diff)||"medium";
function setDiff(d){const s=loadState();s.diff=d;saveState(s);QUIZ_DIFF=d;QuizMenu();}

function pickDistractors(pool,t,need,getText,correctText,rand){
  // lower = more confusable with the target
  const near=p=>Math.abs(p.n-t.n)+Math.abs(p.start-t.start)/8+(partyKey(p.party)===partyKey(t.party)?0:8);
  let arr=pool.slice();
  if(QUIZ_DIFF==="hard"){
    arr.sort((a,b)=>near(a)-near(b));
    arr=shuffle(arr.slice(0,Math.max(need*2,need+2)),rand);
  }else if(QUIZ_DIFF==="easy"){
    arr.sort((a,b)=>near(b)-near(a));
    arr=shuffle(arr.slice(0,Math.max(need*3,need+4)),rand);
  }else{
    // medium: the nearer half of history — a real step between easy and hard
    arr.sort((a,b)=>near(a)-near(b));
    arr=shuffle(arr.slice(0,Math.max(need*6,Math.ceil(arr.length*0.5))),rand);
  }
  const out=[],seen=new Set([correctText]);
  const take=list=>{for(const p of list){const tx=getText(p);if(!seen.has(tx)){seen.add(tx);out.push(tx);}if(out.length>=need)return true;}return false;};
  if(!take(arr)) take(shuffle(pool,rand)); // top up if the narrow band ran dry
  return out;
}

function QuizRun(mode){
  const rand=rngFrom("quiz-"+mode+"-"+Date.now());
  const N=10;
  const targets=pickN(P,N,rand);
  let i=0,score=0;
  function q(){
    if(i>=targets.length){QuizResult(score,targets.length,mode);return;}
    clear();app.appendChild(el(header()));
    const dots=targets.map((_,k)=>`<div class="dot ${k<i?'done':k===i?'on':''}"></div>`).join("");
    const wrap=el(`<div class="card"><div class="progress">${dots}</div><div id="q"></div></div>`);
    app.appendChild(wrap);
    let type=mode;
    if(mode==="mixed"){type=["vp","event","term"][Math.floor(rand()*3)];}
    let t=targets[i];
    if(type==="vp"&&t.vp==="—"){t=sample(P.filter(p=>p.vp!=="—"),rand);}
    quizQuestion(wrap.querySelector("#q"),type,t,rand,ok=>{if(ok)score++;i++;q();});
    app.appendChild(el(`<p class="foot">${QUIZ_DIFF} · Question ${i+1} of ${targets.length} · Score ${score}</p>`));
    endPage();
  }
  q();
}

function quizQuestion(host,type,t,rand,done){
  let prompt,sub,correctText,getText,pool;
  if(type==="vp"){
    prompt=`Who was <b>${t.disp}'s</b> vice president?`;sub=termLabel(t);
    const fv=t.vp.split(";")[0].trim();correctText=fv;
    pool=P.filter(p=>p.vp!=="—"&&p.vp.split(";")[0].trim()!==fv);getText=p=>p.vp.split(";")[0].trim();
  }else if(type==="event"){
    prompt=`“${t.event}”`;sub="Which president?";correctText=t.disp;
    pool=P.filter(p=>p.name!==t.name);getText=p=>p.disp;
  }else{ // term
    prompt=`When did <b>${t.disp}</b> serve?`;sub="Pick the presidential term";correctText=termLabel(t);
    pool=P.filter(p=>termLabel(p)!==termLabel(t));getText=p=>termLabel(p);
  }
  const distract=pickDistractors(pool,t,DIFF[QUIZ_DIFF].opts-1,getText,correctText,rand);
  const opts=shuffle([correctText,...distract],rand);
  host.appendChild(el(`<div class="prompt">${prompt}</div><div class="subprompt">${sub}</div>`));
  const ow=el('<div class="opts"></div>');host.appendChild(ow);
  let answered=false;
  opts.forEach(o=>{
    const b=el(`<button class="opt">${o}</button>`);
    b.onclick=()=>{
      if(answered)return;answered=true;
      const ok=o===correctText;
      [...ow.children].forEach(c=>{if(c.textContent===correctText)c.classList.add("correct");else if(c===b)c.classList.add("wrong");else c.classList.add("dim");});
      toast(ok?"Correct ✓":"Nope");
      host.appendChild(factFace(t,`<b>${t.disp}</b> (No. ${t.n}, ${termLabel(t)}). ${t.event}`));
      const cont=el('<button class="btn" style="margin-top:12px">Next</button>');host.appendChild(cont);cont.onclick=()=>done(ok);
    };
    ow.appendChild(b);
  });
}

/* Sort Challenge — 7 presidents */
function SortChallenge(){
  const rand=rngFrom("sortchal-"+Date.now());
  const N=DIFF[QUIZ_DIFF].sort;
  let items;
  if(QUIZ_DIFF==="hard"){
    // a consecutive run — no era gaps to give the order away
    const s=Math.floor(rand()*(P.length-N));
    items=P.slice(s,s+N);
  } else items=pickN(P,N,rand);
  clear();app.appendChild(el(header('quiz')));
  const wrap=el(`<div class="card"><div class="prompt">Sort Challenge</div>
    <div class="subprompt">★ ${QUIZ_DIFF} · drag ${N} into order, earliest at top ★</div><div id="s"></div></div>`);
  app.appendChild(wrap);
  const shuffled=shuffle(items,rand);
  const sorter=makeSortList(shuffled,wrap.querySelector("#s"));
  const btn=el('<button class="btn" style="margin-top:6px">Lock in order</button>');wrap.querySelector("#s").appendChild(btn);
  btn.onclick=()=>{
    const guess=sorter.getOrder();
    const correct=items.slice().sort((a,b)=>a.start-b.start);
    let hits=0;guess.forEach((g,i)=>{if(g.n===correct[i].n)hits++;});
    sorter.lock(correct);
    btn.outerHTML=`<div class="fact center"><b>${hits}/${N}</b> correct</div>`;
    const cont=el('<button class="btn" style="margin-top:12px">Again</button>');wrap.querySelector("#s").appendChild(cont);cont.onclick=SortChallenge;
    const home=el('<button class="btn secondary" style="margin-top:10px">Quiz menu</button>');wrap.querySelector("#s").appendChild(home);home.onclick=()=>navTo('/quiz');
    toast(hits===N?"Flawless":hits>=Math.ceil(N*.7)?"Strong":"Keep practicing");
  };
  endPage();
}

  "/contact":"About & Contact · Presidentl",
  "/more":"More games · Presidentl"
};
function navTo(path){
  if(currentPath()===path) renderRoute();      // same route: just re-render
  else location.hash="#"+path;                 // else let hashchange drive it
}
function currentPath(){
  const h=(location.hash||"").replace(/^#/,"");
  return ROUTES[h]?h:"/";
}
function renderRoute(){
  const p=currentPath();
  document.title=TITLES[p]||TITLES["/"];
  const m=document.getElementById("menu"); if(m) m.classList.add("hide");
  (ROUTES[p]||Home)();
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",renderRoute);

/* boot */
renderRoute();
</script>
</body>
</html>
